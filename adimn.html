<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - Amine OV</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; color: white; padding: 20px; }
        h1 { text-align: center; color: #8b5cf6; margin-bottom: 30px; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #334155; }
        th { background: #8b5cf6; color: white; font-weight: bold; }
        tr:hover { background: #2d3748; }
        
        .phone-link { color: #10b981; text-decoration: none; font-weight: bold; }
        
        /* تصميم زر الحذف */
        .btn-delete {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Cairo';
            transition: 0.3s;
        }
        .btn-delete:hover { background: #dc2626; transform: scale(1.05); }
    </style>
</head>
<body>

    <h1>لوحة تحكم الطلبات 🚀</h1>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>التاريخ</th>
                    <th>الاسم</th>
                    <th>الهاتف</th>
                    <th>الطلب</th>
                    <th>إجراء</th>
                </tr>
            </thead>
            <tbody id="orders-list">
                </tbody>
        </table>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyADFTTpM05oN5ypOqaNCSkdLiCZbtiA3l4",
            authDomain: "amine-ov.firebaseapp.com",
            projectId: "amine-ov",
            storageBucket: "amine-ov.firebasestorage.app",
            messagingSenderId: "27000450697",
            appId: "1:27000450697:web:ceba8d6c320e85aebda058"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // جلب البيانات مع إضافة زر الحذف لكل سطر
        db.collection("orders").orderBy("date", "desc").onSnapshot((querySnapshot) => {
            const list = document.getElementById("orders-list");
            list.innerHTML = ""; 

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const date = data.date ? data.date.toDate().toLocaleString('ar-DZ') : "غير معروف";
                const docId = doc.id; // نحتاج ID الوثيقة لكي نعرف ماذا نحذف

                list.innerHTML += `
                    <tr>
                        <td>${date}</td>
                        <td>${data.name}</td>
                        <td><a href="tel:${data.phone}" class="phone-link">${data.phone}</a></td>
                        <td>${data.message}</td>
                        <td>
                            <button class="btn-delete" onclick="deleteOrder('${docId}')">حذف</button>
                        </td>
                    </tr>
                `;
            });
        });

        // دالة الحذف
        function deleteOrder(id) {
            if(confirm("هل أنت متأكد من حذف هذا الطلب؟")) {
                db.collection("orders").doc(id).delete()
                .then(() => {
                    console.log("تم الحذف بنجاح");
                })
                .catch((error) => {
                    alert("خطأ في الحذف: " + error);
                });
            }
        }
    </script>
</body>
</html>
