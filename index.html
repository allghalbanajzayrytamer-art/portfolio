<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amine OV</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Cairo',sans-serif;
    background:#0b0f19;
    color:white;
}

/* HEADER */
header{
    text-align:center;
    padding:20px;
}
.logo{
    font-size:26px;
    font-weight:bold;
    color:#8b5cf6;
}

/* HERO */
.hero{
    text-align:center;
    padding:30px 20px;
}
.hero h1{
    font-size:32px;
}
.hero p{
    color:#94a3b8;
}

/* ABOUT */
.about{
    padding:20px;
    display:flex;
    justify-content:center;
}

.about-card{
    max-width:500px;
    background:#111827;
    padding:20px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.about-card h2{
    color:#8b5cf6;
}

.about-card p{
    color:#cbd5e1;
    line-height:1.6;
}

.name{
    color:#8b5cf6;
    font-weight:bold;
}

.skills{
    margin-top:15px;
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

.skills span{
    background:#1f2937;
    padding:6px 10px;
    border-radius:8px;
    font-size:13px;
}

/* FORM */
.card{
    max-width:420px;
    margin:30px auto;
    background:#111827;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

input,textarea{
    width:100%;
    margin-top:10px;
    padding:12px;
    border-radius:10px;
    border:none;
    background:#1f2937;
    color:white;
    outline:none;
}

textarea{
    height:120px;
    resize:none;
}

button{
    width:100%;
    margin-top:15px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#6366f1,#8b5cf6);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    color:#64748b;
    font-size:14px;
}
</style>
</head>

<body>

<header>
    <div class="logo">Amine OV</div>
</header>

<section class="hero">
    <h1>مرحباً 👋</h1>
    <p>مواقع • تطبيقات • تصميم</p>
</section>

<!-- ABOUT -->
<section class="about">
    <div class="about-card">
        <h2>👨‍💻 من أنا</h2>
        <p>
            أنا <span class="name">Amine</span> مطوّر مواقع وتطبيقات،
            نحب نحول الأفكار لمشاريع حقيقية وبسيطة تخدم الناس.
        </p>

        <div class="skills">
            <span>💻 Web Dev</span>
            <span>🔥 Firebase</span>
            <span>🎨 UI Design</span>
        </div>
    </div>
</section>

<!-- FORM -->
<div class="card">
    <input id="name" type="text" placeholder="اسمك">
    <input id="phone" type="tel" placeholder="رقم الهاتف">
    <textarea id="msg" placeholder="اشرح طلبك..."></textarea>
    <button onclick="sendOrder()">إرسال الطلب 🚀</button>
</div>

<footer>© 2026 Amine OV</footer>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyADFTTpM05oN5ypOqaNCSkdLiCZbtiA3l4",
  authDomain: "amine-ov.firebaseapp.com",
  projectId: "amine-ov",
  storageBucket: "amine-ov.firebasestorage.app",
  messagingSenderId: "27000450697",
  appId: "1:27000450697:web:ceba8d6c320e85aebda058"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function sendOrder(){

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let msg = document.getElementById("msg").value;

    if(name=="" || phone=="" || msg==""){
        alert("عمر كل الخانات");
        return;
    }

    db.collection("orders").add({
        name:name,
        phone:phone,
        message:msg,
        date:firebase.firestore.Timestamp.now()
    })
    .then(()=>{
        alert("تم الإرسال بنجاح ✅");

        document.getElementById("name").value="";
        document.getElementById("phone").value="";
        document.getElementById("msg").value="";
    })
    .catch(err=>{
        alert("خطأ ❌");
        console.log(err);
    });
}
</script>

</body>
</html>
