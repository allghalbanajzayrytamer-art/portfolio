<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amine OV - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #8b5cf6;
            --glass-bg: rgba(0, 0, 0, 0.6); /* خلفية غامقة للوضوح */
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: #05070a; /* خلفية سوداء عميقة */
            color: white;
            min-height: 100vh;
        }

        /* --- صفحة الدخول (Glassmorphism Dark) --- */
        #loginBox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            /* خلفية غامقة مع صورة خفيفة */
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070&auto=format&fit=crop') no-repeat center center/cover;
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .glass-card h2 { margin-bottom: 25px; font-weight: 700; color: #fff; }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            outline: none;
            text-align: center;
            font-size: 16px;
        }

        input:focus { border-color: var(--primary); background: rgba(255, 255, 255, 0.1); }

        .btn-login {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 17px;
            transition: 0.3s;
        }

        .btn-login:hover { background: #7c3aed; transform: translateY(-2px); }

        /* --- لوحة التحكم --- */
        #adminContent { display: none; padding: 20px; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto 30px;
            border-bottom: 1px solid var(--glass-border);
        }

        .container { max-width: 900px; margin: auto; }

        .order-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 15px;
            position: relative;
        }

        .order-name { color: var(--primary); font-weight: bold; font-size: 18px; margin-bottom: 5px; }
        .order-phone { color: #94a3b8; font-size: 14px; margin-bottom: 10px; }
        .order-msg { line-height: 1.6; color: #e2e8f0; }

        .del-btn {
            margin-top: 15px;
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid #ef4444;
            padding: 6px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.3s;
        }

        .del-btn:hover { background: #ef4444; color: white; }

        .logout-btn {
            background: none; border: 1px solid #4b5563; color: #9ca3af;
            padding: 5px 12px; border-radius: 8px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="loginBox">
        <div class="glass-card">
            <h2>🔐 Amine OV Admin</h2>
            <input type="email" id="email" placeholder="البريد الإلكتروني">
            <input type="password" id="pass" placeholder="كلمة المرور">
            <button class="btn-login" onclick="login()">دخول آمن</button>
        </div>
    </div>

    <div id="adminContent">
        <header>
            <h2>لوحة التحكم 🚀</h2>
            <button class="logout-btn" onclick="logout()">خروج</button>
        </header>

        <div class="container" id="orders">
            </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
          apiKey: "AIzaSyADFTTpM05oN5ypOqaNCSkdLiCZbtiA3l4",
          authDomain: "amine-ov.firebaseapp.com",
          projectId: "amine-ov",
          storageBucket: "amine-ov.firebasestorage.app",
          messagingSenderId: "27000450697",
          appId: "1:27000450697:web:ceba8d6c320e85aebda058"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // تسجيل الدخول
        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            auth.signInWithEmailAndPassword(email, pass)
                .catch(error => alert("خطأ في الدخول: " + error.message));
        }

        // مراقبة الجلسة
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                loadOrders();
            } else {
                document.getElementById('loginBox').style.display = 'flex';
                document.getElementById('adminContent').style.display = 'none';
            }
        });

        // تسجيل الخروج
        function logout() { auth.signOut(); }

        // جلب الطلبات
        function loadOrders() {
            db.collection("orders").orderBy("date", "desc").onSnapshot(snapshot => {
                const container = document.getElementById('orders');
                container.innerHTML = "";
                snapshot.forEach(doc => {
                    const d = doc.data();
                    container.innerHTML += `
                        <div class="order-card">
                            <div class="order-name">👤 ${d.name}</div>
                            <div class="order-phone">📞 ${d.phone}</div>
                            <div class="order-msg">💬 ${d.message}</div>
                            <button class="del-btn" onclick="deleteOrder('${doc.id}')">حذف الطلب</button>
                        </div>
                    `;
                });
            });
        }

        // حذف الطلب
        function deleteOrder(id) {
            if(confirm("هل أنت متأكد من حذف الطلب؟")) {
                db.collection("orders").doc(id).delete();
            }
        }
    </script>
</body>
</html>
